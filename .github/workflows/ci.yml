name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate skill source
        run: npm run validate:skill

      - name: Build skill artifact
        run: npm run build:skill

      - name: Smoke test installer
        run: npm run test:installer

      - name: Upload built artifact
        uses: actions/upload-artifact@v4
        with:
          name: preact-best-practices-dist
          path: dist/preact-best-practices
          if-no-files-found: error
