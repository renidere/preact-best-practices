name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Skip outdated main runs
        id: freshness
        run: |
          git fetch origin main
          latest_main=$(git rev-parse origin/main)

          if [ "$latest_main" = "$GITHUB_SHA" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Latest main is ${latest_main}; skipping outdated release run for ${GITHUB_SHA}."
          echo "should_release=false" >> "$GITHUB_OUTPUT"

      - name: Validate skill source
        if: steps.freshness.outputs.should_release == 'true'
        run: npm run validate:skill

      - name: Bump release version
        if: steps.freshness.outputs.should_release == 'true'
        id: release_meta
        run: |
          next_version=$(npm run --silent release:bump)
          echo "version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${next_version}" >> "$GITHUB_OUTPUT"
          echo "asset_name=preact-best-practices-${next_version}.zip" >> "$GITHUB_OUTPUT"

      - name: Build skill artifact
        if: steps.freshness.outputs.should_release == 'true'
        run: npm run build:skill

      - name: Smoke test installer
        if: steps.freshness.outputs.should_release == 'true'
        run: npm run test:installer

      - name: Refresh package lockfile
        if: steps.freshness.outputs.should_release == 'true'
        run: npm install --package-lock-only

      - name: Commit release metadata
        if: steps.freshness.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/preact-best-practices/manifest.yaml package.json package-lock.json
          git commit -m "chore(release): ${{ steps.release_meta.outputs.tag }} [skip ci]"

      - name: Archive built skill
        if: steps.freshness.outputs.should_release == 'true'
        run: |
          bundle_dir="release-assets/preact-best-practices-${{ steps.release_meta.outputs.version }}"
          mkdir -p "${bundle_dir}"
          cp README.md package.json "${bundle_dir}/"
          cp -R bin config dist "${bundle_dir}/"
          (
            cd release-assets
            zip -r "${{ steps.release_meta.outputs.asset_name }}" "preact-best-practices-${{ steps.release_meta.outputs.version }}"
          )

      - name: Publish npm package
        if: steps.freshness.outputs.should_release == 'true' && secrets.NPM_TOKEN != ''
        run: npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push release commit and tag
        if: steps.freshness.outputs.should_release == 'true'
        run: |
          git tag -a "${{ steps.release_meta.outputs.tag }}" -m "Release ${{ steps.release_meta.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.release_meta.outputs.tag }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.freshness.outputs.should_release == 'true'
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: preact-best-practices v${{ steps.release_meta.outputs.version }}
          generate_release_notes: true
          files: release-assets/${{ steps.release_meta.outputs.asset_name }}
